<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Replicant — Hiring Trends</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #0D1117; color: #E6EDF3;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .gate { text-align: center; padding: 40px; max-width: 360px; width: 100%; }
    .logo {
      width: 48px; height: 48px; background: #B0FA7B; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 26px; color: #0D1117; margin: 0 auto 24px;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    p { font-size: 13px; color: #8B949E; margin-bottom: 28px; }
    input {
      width: 100%; padding: 12px 16px; border-radius: 8px;
      border: 1px solid #30363D; background: #161B22;
      color: #E6EDF3; font-size: 15px; margin-bottom: 12px; outline: none;
    }
    input:focus { border-color: #B0FA7B; }
    button {
      width: 100%; padding: 12px; border-radius: 8px; border: none;
      background: #B0FA7B; color: #0D1117; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    button:hover { background: #9de862; }
    .error { color: #F85149; font-size: 13px; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div class="gate">
    <div class="logo">S</div>
    <h1>Hiring Trends Report</h1>
    <p>Accounting & Finance Market Intelligence</p>
    <input type="password" id="pw" placeholder="Password" autofocus />
    <button onclick="check()">Enter</button>
    <div class="error" id="err">Incorrect password.</div>
  </div>
  <script>
    if (sessionStorage.getItem('replicant_auth') === '1') {
      window.location.href = '/replicant/report.html';
    }
    document.getElementById('pw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') check();
    });
    function check() {
      if (document.getElementById('pw').value === 'letmein') {
        sessionStorage.setItem('replicant_auth', '1');
        window.location.href = '/replicant/report.html';
      } else {
        document.getElementById('err').style.display = 'block';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    }
  </script>
</body>
</html>
